<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Portal</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
/* BODY & FLEX CENTER */


/* CARD */
.card {
  width:400px;
  max-width:90%;
  padding:40px;
  border-radius:15px;
  text-align:center;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  margin-top:100px; /* navbar ke liye thoda spacing */
}

input {
  width:100%;
  padding:12px;
  margin:12px 0;
  border-radius:8px;
  border:none;
  font-size:16px;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#00f7ff;
  color:#1e3c72;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#00d6e6;
}

.dashboard { display:none; }

/* RESPONSIVE */
@media (max-width:480px){
  .card { padding:20px; width:95%; }
  .logo{ font-size:24px; }
  .nav-links{ gap:15px; font-size:14px; }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">Bright Eaglets</div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="courses.html">Courses</a></li>
    <li><a href="admission.html">Admission</a></li>
    <li><a href="student.html">Student</a></li>
    <li><a href="teacher.html">Teacher</a></li>
    <li><a href="contact.html">Contact</a></li>
     <li><a href="about.html">About</a></li>
  </ul>
</nav>
<!-- LOGIN -->
<div class="card" id="loginForm">
  <h3>Student Login</h3>
  <input type="email" id="loginEmail" placeholder="Email">
  <input type="password" id="loginPassword" placeholder="Password">
  <button id="loginBtn">Login</button>
  <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
</div>

<!-- DASHBOARD -->
<div class="card dashboard" id="dashboard">
  <h3>Welcome, <span id="studentName"></span></h3>
  <p><strong>ID:</strong> <span id="studentId"></span></p>
  <p><strong>Course:</strong> <span id="studentCourse"></span></p>
  <button id="logoutBtn" style="background:#ff4b5c;margin-top:20px;">Logout</button>
</div>

<script>
// LOGIN
document.getElementById('loginBtn').addEventListener('click', () => {
  const student = JSON.parse(localStorage.getItem('student'));
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;

  if(student && student.email === email && student.password === password){
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('studentName').textContent = student.name;
    document.getElementById('studentId').textContent = student.studentId;
    document.getElementById('studentCourse').textContent = student.course;
  } else {
    alert("Invalid credentials!");
  }
});

// LOGOUT
document.getElementById('logoutBtn').addEventListener('click', () => {
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginForm').style.display = 'block';
});
</script>

</body>
</html>
