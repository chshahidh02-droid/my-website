<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  background:#0d1b4c;
  color:white;
  padding:20px;
}

h2{
  text-align:center;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  background:white;
  color:black;
  border-radius:10px;
  overflow:hidden;
}

th, td{
  padding:12px;
  text-align:center;
  border-bottom:1px solid #ddd;
}

th{
  background:#007bff;
  color:white;
}

img{
  width:50px;
  height:50px;
  border-radius:50%;
  object-fit:cover;
}

tr:hover{
  background:#f1f1f1;
}
</style>
</head>

<body>

<h2>📋 Student Records (Admin Panel)</h2>

<table>
<thead>
<tr>
<th>Photo</th>
<th>Name</th>
<th>ID</th>
<th>Phone</th>
<th>Course</th>
<th>Date & Time</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];

let table = document.getElementById("tableBody");

students.forEach(student => {
  let row = `
    <tr>
      <td><img src="${student.photo}"></td>
      <td>${student.name}</td>
      <td>${student.id}</td>
      <td>${student.phone}</td>
      <td>${student.course}</td>
      <td>${student.date}</td>
    </tr>
  `;
  table.innerHTML += row;
});
</script>

</body>
</html>
